<!DOCTYPE html>
<html>
<head>
  <title>PyPI Offline Fetcher</title>
</head>
<body>
  <h2>Download Offline Python Package</h2>

  <input id="pkg" placeholder="e.g. uvicorn or uvicorn==0.29.0" />

  <select id="pyver">
    <option value="3.8">Python 3.8</option>
    <option value="3.9">Python 3.9</option>
    <option value="3.10" selected>Python 3.10</option>
    <option value="3.11">Python 3.11</option>
    <option value="3.12">Python 3.12</option>
  </select>

  <select id="os">
    <option value="win_amd64">Windows 64-bit</option>
    <option value="win32">Windows 32-bit</option>
    <option value="manylinux_2_17_x86_64">Linux x86_64</option>
    <option value="manylinux_2_17_aarch64">Linux ARM64</option>
    <option value="macosx_12_0_x86_64">macOS Intel</option>
    <option value="macosx_12_0_arm64">macOS Apple Silicon</option>
  </select>

  <button onclick="trigger()">Fetch Package</button>
  <div id="status"></div>

  <script>
    const OWNER = 'isromeet221';
    const REPO  = 'universal-packages';
    const TOKEN = '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';

    const API_VERSION = '2026-03-10';

    const HEADERS = {
      'Authorization': `Bearer ${TOKEN}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': API_VERSION
    };

    let triggerredRunId = null;

    async function trigger() {
      const pkg   = document.getElementById('pkg').value.trim();
      const pyver = document.getElementById('pyver').value;
      const os    = document.getElementById('os').value;

      if (!pkg) { setStatus('Enter a package name.'); return; }

      setStatus('Triggering workflow...');

      // record time just before dispatch so we can find the correct run
      const dispatchTime = new Date().toISOString();

      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/universal_fetcher.yml/dispatches`,
        {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({
            ref: 'main',
            inputs: { package_name: pkg, python_version: pyver, os_type: os }
          })
        }
      );

      if (res.status !== 204) {
        setStatus(`Trigger failed: HTTP ${res.status}`);
        return;
      }

      // build the exact tag the workflow will create (must match workflow SAFE_PKG logic)
      const safePkg = pkg.replace(/[>=<]/g, '-');
      const tag     = `pkg-${safePkg}-${os}`;   // run_id appended by workflow, so poll by prefix

      setStatus('Workflow triggered. Waiting 75s before polling...');
      setTimeout(() => pollByTag(tag, os, pkg, 0), 75000);
    }

    // Poll using GET /releases/tags/{tag} — exact lookup, no fuzzy scan
    // Because run_id is appended, we fall back to list + prefix match but with correct version header
    async function pollByTag(tagPrefix, os, pkg, attempts) {
      if (attempts > 10) { setStatus('Timed out. Check the Actions tab.'); return; }

      // list releases with correct API version and max page size
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/releases?per_page=100`,
        { headers: HEADERS }
      );

      if (!res.ok) { setStatus(`Release list failed: HTTP ${res.status}`); return; }

      const releases = await res.json();

      // match by tag prefix (pkg-<name>-<os>-<run_id>)
      const match = releases.find(r =>
        r.tag_name.startsWith(tagPrefix) &&
        r.assets.length > 0 &&
        r.assets[0].state === 'uploaded'   // doc field: confirms asset fully uploaded
      );

      if (match) {
        const url = match.assets[0].browser_download_url;
        document.getElementById('status').innerHTML =
          `<a href="${url}">Download ${pkg} (${os})</a>`;
      } else {
        setStatus(`Not ready, retrying... (${attempts + 1}/10)`);
        setTimeout(() => pollByTag(tagPrefix, os, pkg, attempts + 1), 15000);
      }
    }

    function setStatus(msg) {
      document.getElementById('status').innerText = msg;
    }
  </script>
</body>
</html>
