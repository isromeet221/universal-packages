<!DOCTYPE html>
<html>
<head>
  <title>PyPI Offline Fetcher</title>
</head>
<body>
  <h2>Download Offline Python Package</h2>

  <input id="pkg" placeholder="e.g. uvicorn or uvicorn==0.29.0" />

  <select id="pyver">
    <option value="3.8">Python 3.8</option>
    <option value="3.9">Python 3.9</option>
    <option value="3.10" selected>Python 3.10</option>
    <option value="3.11">Python 3.11</option>
    <option value="3.12">Python 3.12</option>
  </select>

  <select id="os">
    <option value="win_amd64">Windows 64-bit</option>
    <option value="win32">Windows 32-bit</option>
    <option value="manylinux_2_17_x86_64">Linux x86_64</option>
    <option value="manylinux_2_17_aarch64">Linux ARM64</option>
    <option value="macosx_12_0_x86_64">macOS Intel</option>
    <option value="macosx_12_0_arm64">macOS Apple Silicon</option>
  </select>

  <button onclick="trigger()">Fetch Package</button>
  <div id="status"></div>

  <script>
    const OWNER = 'isromeet221';
    const REPO  = 'universal-packages';
    const TOKEN = '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';

    const HEADERS = {
      'Authorization': `Bearer ${TOKEN}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2026-03-10'
    };

    // mirrors the exact tr command in the workflow
    function sanitizePkg(pkg) {
      return pkg.replace(/[>=<!]/g, '-').replace(/\s/g, '');
    }

    async function trigger() {
      const pkg   = document.getElementById('pkg').value.trim();
      const pyver = document.getElementById('pyver').value;
      const os    = document.getElementById('os').value;

      if (!pkg) { setStatus('Enter a package name.'); return; }

      setStatus('Triggering workflow...');

      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/universal_fetcher.yml/dispatches`,
        {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({
            ref: 'main',
            inputs: {
              package_name: pkg,
              python_version: pyver,
              os_type: os
            }
          })
        }
      );

      if (res.status !== 204) {
        setStatus(`Trigger failed: HTTP ${res.status}`);
        return;
      }

      // build tag prefix exactly as workflow does:
      // pkg-<SAFE_PKG>-<os_type>-  (run_id appended by workflow, unknown here)
      const safePkg  = sanitizePkg(pkg);
      const tagPrefix = `pkg-${safePkg}-${os}-`;

      setStatus('Triggered. Waiting 75s before polling...');
      setTimeout(() => pollReleases(tagPrefix, pkg, os, 0), 75000);
    }

    async function pollReleases(tagPrefix, pkg, os, attempts) {
      if (attempts > 10) {
        setStatus('Timed out. Check the Actions tab manually.');
        return;
      }

      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/releases?per_page=100`,
        { headers: HEADERS }
      );

      if (!res.ok) {
        setStatus(`Release list failed: HTTP ${res.status}`);
        return;
      }

      const releases = await res.json();

      const match = releases.find(r =>
        r.tag_name.startsWith(tagPrefix) &&
        r.assets.length > 0 &&
        r.assets[0].state === 'uploaded'
      );

      if (match) {
        const url = match.assets[0].browser_download_url;
        document.getElementById('status').innerHTML =
          `<a href="${url}">Download ${pkg} (${os})</a>`;
      } else {
        setStatus(`Not ready, retrying... (${attempts + 1}/10)`);
        setTimeout(() => pollReleases(tagPrefix, pkg, os, attempts + 1), 15000);
      }
    }

    function setStatus(msg) {
      document.getElementById('status').innerText = msg;
    }
  </script>
</body>
</html>
